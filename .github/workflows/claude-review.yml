name: Claude Code Review

# Model: Sonnet (not Opus)
# Reason: Opus is reserved for PM/planning tasks.
# Review, lint fix, and focused code tasks perform equally well on Sonnet
# at 60% lower cost and without consuming the Opus rate pool.
# See: https://linear.app/claude-code-cowork/document/auto-pilot-実行プラン-v1pm分析-2026-03-28-e00b73d3cf61

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          model: claude-sonnet-4-6
          claude_args: "--model sonnet"
          prompt: |
            Review this PR against the following criteria (priority order):

            P0 Security (Blocker):
            - No hardcoded secrets, API keys, tokens
            - No SQL injection, XSS, command injection
            - Vault secrets accessed only via get_secret()

            P1 Data Integrity (Blocker):
            - No unguarded DELETE/DROP without WHERE
            - No destructive migration without backup step

            P2 Correctness:
            - Does the code do what the PR description claims?
            - Are edge cases handled?

            P3 Code Quality:
            - Follow language-specific style guides
            - Conventional Commits in PR title
            - PR description has 4-point set

            P4 Performance:
            - No N+1 queries, unnecessary API calls

            Format: Must Fix for P0-P1, Should Consider for P2-P3, Minor for P4+.
            If no P0/P1 issues, approve the PR.
